name: Generate and deploy GitHub Readme Stats

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clone github-readme-stats
        run: |
          git clone https://github.com/anuraghazra/github-readme-stats.git /tmp/github-readme-stats
          cd /tmp/github-readme-stats
          npm install --legacy-peer-deps

      - name: Start stats server
        run: |
          cd /tmp/github-readme-stats
          # export PORT and HOST so server binds predictably, then start in background
          export PORT=3000
          export HOST=0.0.0.0
          echo "Starting server with PORT=$PORT HOST=$HOST"
          nohup npm run start > /tmp/ghrs.log 2>&1 &

          # wait for server to accept connections (max 60s)
          for i in {1..60}; do
            if curl -sS --fail http://localhost:3000/ >/dev/null 2>&1; then
              echo "server is up"
              break
            fi
            sleep 1
          done

          echo "=== server log ==="
          tail -n +1 /tmp/ghrs.log || true

      - name: Generate SVGs
        env:
          USERNAME: 0dawara
        run: |
          mkdir -p generated
          # try multiple times in case server is still warming up
          curl --fail --retry 10 --retry-delay 2 --retry-connrefused -sS "http://localhost:3000/api?username=${USERNAME}&show_icons=true&theme=midnight-purple&hide_border=true" -o generated/stats.svg
          curl --fail --retry 10 --retry-delay 2 --retry-connrefused -sS "http://localhost:3000/api/top-langs/?username=${USERNAME}&layout=compact&theme=midnight-purple&hide_border=true" -o generated/top-langs.svg
          ls -l generated

      - name: Deploy generated images to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone or create gh-pages branch
          if git ls-remote --exit-code --heads https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages; then
            git clone --branch gh-pages https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages gh-pages
          else
            git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages gh-pages || git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages gh-pages
            cd gh-pages || true
            git checkout --orphan gh-pages || true
            cd - || true
          fi

          rm -rf gh-pages/*
          mkdir -p gh-pages/images
          cp generated/*.svg gh-pages/images/

          cd gh-pages
          git add -A
          git commit -m "chore(readme-stats): update generated SVGs" || echo "no changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} gh-pages --force
